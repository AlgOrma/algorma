[pytest]
; Make `from app...` imports work when running pytest from backend/.
pythonpath = .
testpaths = tests
; FastAPI 0.115 + pydantic 2.13 re-validation noise, benign — same filter and
; rationale as app/main.py (pytest's warning capture bypasses the runtime one).
filterwarnings =
    ignore::pydantic.warnings.UnsupportedFieldAttributeWarning
